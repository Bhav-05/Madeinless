server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # container_name label (strips leading slash)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'

      # service name label (same as container_name — useful for Loki queries)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'service'

      # image label — helps TM2 filter by microservice type
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'

      # compose project label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'

      # Drop internal infra logs to reduce noise for the ML model
      - source_labels: ['container_name']
        regex: '(cadvisor|promtail|grafana)'
        action: drop